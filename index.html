<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBAL'S</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>EBAL'S</h1>
            <p>Expert Business Analytics Legal Solutions</p>
        </header>
        <section class="contacts">
            <h2>CONTACTS</h2>
            <ul class="contact-list">
                <li>
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:ebals@ebals.slmail.me" class="contact-btn">Email</a>
                </li>
                <li>
                    <i class="fab fa-telegram"></i>
                    <a href="https://t.me/EBAL_S" target="_blank" class="contact-btn">Telegram</a>
                </li>
            </ul>
        </section>
        <section class="contact-form">
            <h2>CONTACT EBAL'S</h2>
            <form id="myForm" action="https://formspree.io/f/mwplpkrv" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit">Submit</button>
            </form>
            <div id="success-message" class="hidden">The message has been successfully sent!<br></div>
        </section>
    </div>
</body>
</html>
